services:
  ml_service:
    build:
      context: ./ml_service
    container_name: housing-ml-service
    env_file:
      - ./app.env
    ports:
      - "8000:7860"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  server:
    build:
      context: ./server
    container_name: housing-streamlit-server
    env_file:
      - ./app.env
    depends_on:
      ml_service:
        condition: service_healthy
    ports:
      - "8501:8501"
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.5.1
    container_name: housing-mlflow
    profiles: ["local-mlflow"]
    command: >-
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////assets/mlflow/mlflow.db
      --default-artifact-root /assets/mlflow/artifacts
    volumes:
      - ./assets:/assets
    ports:
      - "5000:5000"
    restart: unless-stopped