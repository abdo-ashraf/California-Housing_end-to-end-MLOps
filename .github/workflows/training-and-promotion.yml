name: Training And Promotion CI

on:
  push:
    branches: [main]
    paths:
      - "training_and_promotion/**"
      - ".github/workflows/training-and-promotion.yml"
  pull_request:
    branches: [main]
    paths:
      - "training_and_promotion/**"
      - ".github/workflows/training-and-promotion.yml"
  workflow_dispatch:
    inputs:
      run_full_training:
        description: "Run full training pipeline job"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      manifest_path:
        description: "Optional manifest path override"
        required: false
        default: "training_and_promotion/config/manifests/default_v1.json"
        type: string
  schedule:
    - cron: "0 2 * * 1"

concurrency:
  group: training-and-promotion-${{ github.ref }}
  cancel-in-progress: false

jobs:
  review:
    name: Check Required Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          required_files=(
            "training_and_promotion/main.py"
            "training_and_promotion/requirements.txt"
            "training_and_promotion/config/manifests/default_v1.json"
            "training_and_promotion/components/component_registry.py"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            else
              echo "Found $file"
            fi
          done

  ci-checks:
    name: Manifest and Import Checks
    runs-on: ubuntu-latest
    needs: review

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: training_and_promotion/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r training_and_promotion/requirements.txt

      - name: Validate manifest and component resolution imports
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          sys.path.insert(0, str(Path("training_and_promotion").resolve()))

          from config import load_run_manifest
          from components import get_trainer_component, get_tracker_component

          manifest = load_run_manifest(Path("training_and_promotion/config/manifests/default_v1.json"))
          assert manifest.model_name, "model_name must not be empty"

          get_tracker_component(manifest.tracker["component"], manifest.tracker["version"])
          get_trainer_component(manifest.trainer["component"], manifest.trainer["version"])

          print("Manifest and component checks passed")
          PY
