name: Deploy Streamlit Server

on:
  push:
    branches: [main]
    paths:
      - "app/server/**"
  pull_request:
    branches: [main]
    paths:
      - "app/server/**"
    workflow_dispatch:

jobs:

  review:
    name: Check Required Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          cd app/server

          required_files=("app.py" "Dockerfile" "requirements.txt")

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            else
              echo "Found $file"
            fi
          done


  build:
  name: Build Docker Image
  runs-on: ubuntu-latest
  needs: review

  steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: |
        cd app/server
        docker build -t housing-server .

  deploy:
    name: Push to HuggingFace Space
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SERVER_SPACE_NAME }}
        run: |
          # Clone into a folder named 'hf_space_repo'
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME hf_space_repo

      - name: Sync server to Space
        run: |
          # Copy contents of server into the cloned repo
          # The trailing slash on server/ means "contents of this folder"
          rsync -av --delete --exclude=".git" app/server/ hf_space_repo/

      - name: Commit and Push to HuggingFace
        run: |
          cd hf_space_repo
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add .
          # Only commit and push if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto deploy from GitHub Actions: ${{ github.sha }}"
            git push
          else
            echo "No changes to deploy"
          fi


